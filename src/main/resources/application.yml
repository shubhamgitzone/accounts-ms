server:
  port: 8080

spring:
  application:
    name: "accounts"
  profiles:
    active: "prod"
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: "optional:configserver:http://localhost:8071/"
    #configsever -- indicates to sb apps that it's going ot connect to configserver
    #optional -- tells account-ms if can't connect to configserver, still starts accounts-ms
    #             if properties are important to load then remove this optional
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

management:
  endpoints:
    web:
      exposure:
        include: "*" #tells SB actuator to enable and expose all management endpoint supported by SB actuater
        #helps change porperties value without restarting the config server
        # instead of *, use busRefresh for spring cloud bus
        #             and use refresh for actuator refresh